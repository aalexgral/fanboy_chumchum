    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fanboy y ChumChum</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <section class="hero-contacet">
            <img src="content/contacte.png" alt="Foto de fondo">
        </section>
        <header class="site-header">
            <div class="header-inner">
                <img src="content/image-removebg-preview.png" alt="Fanboy & Chumchum Logo" class="logo">
                <nav class="main-nav">
                <ul>
                    <li><a href="main.html">HOME</a></li>
                    <li><a href="capitols.HTML">EPISODIOS</a></li>
                    <li><a href="personajes.html">PERSONAJES</a></li>
                    <li><a href="#">JUEGOS</a></li>
                    <li><a href="#">PRODUCTOS</a></li>
                    <li><a href="contacte.html">CONTACTO</a></li>
                </ul>
                </nav>
            </div>
        </header>
            <div class="container">
        <h2>Contáctanos</h2>
        <form id="contact-form" action="#" method="POST" onsubmit="return validateForm()">
            <div class="form-group">
                <label for="name">Nombre:</label>
                <input type="text" id="name" name="name" required placeholder="Tu nombre">
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" required placeholder="Tu correo electrónico">
            </div>

            <div class="form-group">
                <label for="subject">Asunto:</label>
                <input type="text" id="subject" name="subject" required placeholder="Asunto">
            </div>

            <div class="form-group">
                <label for="message">Mensaje:</label>
                <textarea id="message" name="message" required placeholder="Tu mensaje..."></textarea>
            </div>

            <div class="form-group">
                <button type="submit" class="submit-btn">Enviar</button>
            </div>

            <div id="error-message" style="color: red; display: none;">
                Por favor, completa todos los campos correctamente.
            </div>
        </form>
    </div>

    <script src="script.js"></script>
    </body>
    </html>
